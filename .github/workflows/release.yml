name: Xodium CI/CD - Release

on:
  push:
    branches: [main]
    paths: [ "irp/**" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}
      url: ${{ steps.create_release.outputs.url }}
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
      SHA1: ${{ steps.calculate_sha1.outputs.SHA1 }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - id: get_version
        name: Get Version
        run: |
          MC_VERSION=$(jq -r '.pack.description' irp/pack.mcmeta | grep -oP '\d+\.\d+\.\d+')
          echo "VERSION=${MC_VERSION}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - id: packsquash
        name: Create Zip & Optimize with Packsquash
        uses: ComunidadAylas/PackSquash-action@a4c298b164ca6ea9f3eadc129e14b8f22af381a3
        with:
          packsquash_version: latest-unstable
          options: |
            pack_directory = 'irp'
            output_file_path = 'irp_v${{ steps.get_version.outputs.VERSION }}.zip'

      - id: calculate_sha1
        name: Calculate SHA1
        run: echo "SHA1=$(sha1sum "irp_v${{ steps.get_version.outputs.VERSION }}.zip" | awk '{ print $1 }')" >> $GITHUB_OUTPUT

      - id: create_release
        name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: ${{ contains(github.event.head_commit.message, '.draft') }}
          files: irp_v${{ steps.get_version.outputs.VERSION }}.zip
          body: |
            Direct Download Link: https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.VERSION }}/irp_v${{ steps.get_version.outputs.VERSION }}.zip
            SHA-1 Hash: ${{ steps.calculate_sha1.outputs.SHA1 }}
          generate_release_notes: true
          prerelease: ${{ contains(github.event.head_commit.message, '.pre') }}
          tag_name: v${{ steps.get_version.outputs.VERSION }}
